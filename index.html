<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Rhythm" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0e14" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <script>
      (function () {
        try {
          var purgeKey = '__SW_PURGE_KEY__';
          if (localStorage.getItem(purgeKey)) return;
          localStorage.setItem(purgeKey, '1');
          localStorage.removeItem('rhythm-app-build-id');
          localStorage.removeItem('__FORCE_LOGIN_KEY__');
          var reloadKey = '__SW_RELOAD_KEY__';
          function maybeReload() {
            if (!sessionStorage.getItem(reloadKey)) {
              sessionStorage.setItem(reloadKey, '1');
              location.reload();
            }
          }
          var p = Promise.resolve();
          if ('serviceWorker' in navigator) {
            p = navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            });
          }
          p.then(function () {
            if ('caches' in window) {
              return caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              });
            }
          }).then(maybeReload).catch(maybeReload);
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var gateKey = '__FORCE_LOGIN_KEY__';
          if (localStorage.getItem(gateKey) === 'done') return;
          for (var i = localStorage.length - 1; i >= 0; i--) {
            var k = localStorage.key(i);
            if (
              k &&
              (k.indexOf('firebase:') === 0 ||
                k.indexOf('sb-') === 0 ||
                k.indexOf('firebaseLocalStorage') >= 0)
            ) {
              localStorage.removeItem(k);
            }
          }
          localStorage.setItem(gateKey, 'done');
          var loginPath = '__LOGIN_PATH__';
          var path = location.pathname;
          if (path !== loginPath && path.slice(-6) !== '/login') {
            location.replace(loginPath + location.search + location.hash);
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var raw = null;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('rhythm-app-v2') === 0) {
              raw = localStorage.getItem(k);
              break;
            }
          }
          if (!raw) raw = localStorage.getItem('schedule-app-state');
          var theme = 'dark';
          if (raw) {
            var parsed = JSON.parse(raw);
            theme = parsed && parsed.settings && parsed.settings.theme ? parsed.settings.theme : 'dark';
          }
          var resolved =
            theme === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : theme;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0a0e14' : '#f4f6f9');
        } catch (e) {}
      })();
    </script>
    <title>Rhythm</title>
    <meta name="description" content="Mobile-first schedule & productivity for remote work, fitness, study, and social balance." />
    <meta property="og:title" content="Rhythm — Daily Schedule" />
    <meta property="og:description" content="Balance remote work, study, gym, and rest. Works on phone and desktop." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root">
      <p style="margin:0;padding:24px;background:var(--rhythm-bg,#0a0e14);color:var(--rhythm-muted,#8b9cb3);font-family:-apple-system,system-ui,sans-serif">
        Loading Rhythm…
      </p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
