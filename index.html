<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Rhythm" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0e14" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <script>
      (function () {
        try {
          var epochKey = '__AUTH_EPOCH_KEY__';
          var epochVal = '__AUTH_EPOCH_VALUE__';
          var loginPath = '__LOGIN_PATH__';
          function onLoginPage() {
            var p = location.pathname;
            return p === loginPath || p.slice(-6) === '/login';
          }
          function clearStoredAuth() {
            var remove = [];
            for (var i = 0; i < localStorage.length; i++) {
              var k = localStorage.key(i);
              if (
                k &&
                (k.indexOf('firebase:') === 0 ||
                  k.indexOf('sb-') === 0 ||
                  k.indexOf('firebaseLocalStorage') >= 0 ||
                  k.indexOf('rhythm-login:') === 0)
              ) {
                remove.push(k);
              }
            }
            remove.forEach(function (k) {
              localStorage.removeItem(k);
            });
          }
          if (localStorage.getItem(epochKey) !== epochVal) {
            clearStoredAuth();
            localStorage.setItem(epochKey, epochVal);
            if (!onLoginPage()) {
              location.replace(loginPath + '?auth=required&_=' + Date.now());
            }
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var purgeKey = '__SW_PURGE_KEY__';
          if (localStorage.getItem(purgeKey)) return;
          localStorage.setItem(purgeKey, '1');
          localStorage.removeItem('rhythm-app-build-id');
          var reloadKey = '__SW_RELOAD_KEY__';
          function maybeReload() {
            if (!sessionStorage.getItem(reloadKey)) {
              sessionStorage.setItem(reloadKey, '1');
              location.reload();
            }
          }
          var p = Promise.resolve();
          if ('serviceWorker' in navigator) {
            p = navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            });
          }
          p.then(function () {
            if ('caches' in window) {
              return caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              });
            }
          }).then(maybeReload).catch(maybeReload);
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var gateKey = '__FORCE_LOGIN_KEY__';
          if (localStorage.getItem(gateKey) === 'done') return;
          localStorage.setItem(gateKey, 'done');
          var loginPath = '__LOGIN_PATH__';
          var path = location.pathname;
          var onLogin = path === loginPath || path.slice(-6) === '/login';
          var hasSession = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (!k) continue;
            if (k.indexOf('firebase:authUser') !== -1 || k.indexOf('firebaseLocalStorage') !== -1) {
              hasSession = true;
              break;
            }
            if (k.indexOf('firebase:') === 0 && k.toLowerCase().indexOf('auth') !== -1) {
              hasSession = true;
              break;
            }
          }
          if (!onLogin && !hasSession) {
            location.replace(loginPath + location.search + location.hash);
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        var loginPath = '__LOGIN_PATH__';
        var bundleRev = '__AUTH_BUNDLE_REV__';
        function isLoginPage() {
          var p = location.pathname;
          return p === loginPath || p.slice(-6) === '/login';
        }
        function hasFirebaseSession() {
          try {
            for (var i = 0; i < localStorage.length; i++) {
              var k = localStorage.key(i);
              if (!k) continue;
              if (k.indexOf('firebase:authUser') !== -1 || k.indexOf('firebaseLocalStorage') !== -1) return true;
              if (k.indexOf('firebase:') === 0 && k.toLowerCase().indexOf('auth') !== -1) return true;
            }
          } catch (e) {}
          return false;
        }
        function hasLegacyAppData() {
          try {
            for (var i = 0; i < localStorage.length; i++) {
              var k = localStorage.key(i);
              if (k && (k.indexOf('rhythm-app-v2') === 0 || k === 'schedule-app-state')) return true;
            }
          } catch (e) {}
          return false;
        }
        function goLogin() {
          var sep = loginPath.indexOf('?') >= 0 ? '&' : '?';
          location.replace(loginPath + sep + 'refresh=' + Date.now());
        }
        function guardLogin() {
          if (isLoginPage()) return;
          if (!hasFirebaseSession()) {
            goLogin();
          }
        }
        guardLogin();
        setTimeout(function () {
          if (window.__RHYTHM_AUTH_REV__ !== bundleRev && !isLoginPage()) {
            if (!hasFirebaseSession()) goLogin();
            else location.reload();
          }
        }, 3000);
      })();
    </script>
    <script>
      (function () {
        try {
          var raw = null;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('rhythm-app-v2') === 0) {
              raw = localStorage.getItem(k);
              break;
            }
          }
          if (!raw) raw = localStorage.getItem('schedule-app-state');
          var theme = 'dark';
          if (raw) {
            var parsed = JSON.parse(raw);
            theme = parsed && parsed.settings && parsed.settings.theme ? parsed.settings.theme : 'dark';
          }
          var resolved =
            theme === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : theme;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0a0e14' : '#f4f6f9');
        } catch (e) {}
      })();
    </script>
    <title>Rhythm</title>
    <meta name="description" content="Rhythm helps you plan your day, build habits, focus with timers, and track balance across work, study, fitness, and rest. Mobile-first and built for real life." />
    <meta property="og:title" content="Rhythm — Daily Schedule & Habits" />
    <meta property="og:description" content="Plan your day, stay focused, track habits, and keep work, study, fitness, and rest in balance. Free to use in your browser." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root">
      <p style="margin:0;padding:24px;background:var(--rhythm-bg,#0a0e14);color:var(--rhythm-muted,#8b9cb3);font-family:-apple-system,system-ui,sans-serif">
        Loading Rhythm…
      </p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
