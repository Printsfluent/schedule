<!--
  Supabase → Authentication → Email Templates → Confirm signup
  Subject: Confirm your Rhythm account
-->

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@700&display=swap');
</style>

<div style="margin:0;padding:0;background-color:#06080c;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#06080c;padding:36px 16px;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:440px;">
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <div style="font-family:'DM Sans',-apple-system,sans-serif;font-size:30px;font-weight:700;letter-spacing:-0.04em;color:#f4f7fb;">
                Rhythm
              </div>
              <div style="margin-top:8px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.28em;text-transform:uppercase;color:#3dd68c;">
                Welcome
              </div>
            </td>
          </tr>

          <tr>
            <td style="background-color:#0e141c;border:1px solid #1c2836;border-radius:22px;padding:36px 30px;">
              <h2 style="margin:0 0 14px;font-family:'DM Sans',-apple-system,sans-serif;font-size:24px;font-weight:700;letter-spacing:-0.03em;color:#f4f7fb;line-height:1.25;">
                Confirm your account
              </h2>
              <p style="margin:0 0 32px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:400;line-height:1.65;color:#9db0cc;">
                Thanks for signing up. Enter this code in Rhythm to finish creating your account.
              </p>

              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <div style="display:inline-block;padding:22px 32px;border-radius:18px;background-color:#06080c;border:1px solid #243447;">
                      <div style="font-family:'Space Mono','Courier New',Courier,monospace;font-size:38px;font-weight:700;letter-spacing:0.38em;padding-left:0.38em;color:#3dd68c;line-height:1;mso-line-height-rule:exactly;">
                        {{ .Token }}
                      </div>
                    </div>
                  </td>
                </tr>
              </table>

              <p style="margin:0;font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.55;color:#5f738a;text-align:center;">
                If you didn&rsquo;t create an account, you can ignore this email.
              </p>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-top:26px;font-family:'DM Sans',sans-serif;font-size:11px;line-height:1.5;color:#445566;">
              Sent securely by Rhythm
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</div>
